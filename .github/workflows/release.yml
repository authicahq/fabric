name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for hatch-vcs to determine version from tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Verify version
        run: |
          echo "Building version: $(python -c 'from fabric import __version__; print(__version__)')"

      - name: Build executable
        run: |
          python scripts/build.py --backend pyinstaller --onefile

      - name: Create tarball
        run: |
          cd dist
          tar czf fabric-${{ github.ref_name }}-linux-x86_64.tar.gz fabric-*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for hatch-vcs to determine version from tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Verify version
        run: |
          echo "Building version: $(python -c 'from fabric import __version__; print(__version__)')"

      - name: Build executable
        run: |
          python scripts/build.py --backend pyinstaller --onefile

      - name: Create tarball
        run: |
          cd dist
          tar czf fabric-${{ github.ref_name }}-macos-universal.tar.gz fabric-*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for hatch-vcs to determine version from tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Verify version
        run: |
          python -c "from fabric import __version__; print(f'Building version: {__version__}')"

      - name: Build executable
        run: |
          python scripts/build.py --backend pyinstaller --onefile

      - name: Create zip
        run: |
          cd dist
          Compress-Archive -Path fabric-*.exe -DestinationPath fabric-${{ github.ref_name }}-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for hatch-vcs to determine version from tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build source distribution
        run: |
          python -m build --sdist

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: |
          find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            dist/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
