name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for hatch-vcs to determine version from tags

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify version
        run: |
          echo "Package version: $(python -c 'from fabric import __version__; print(__version__)')"

      - name: Lint with ruff
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Type check with mypy
        run: |
          mypy src
        continue-on-error: true

      - name: Test with pytest
        run: |
          pytest -v --cov=fabric --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for hatch-vcs to determine version from tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Verify version
        run: |
          echo "Building version: $(python -c 'from fabric import __version__; print(__version__)')"

      - name: Build executable (PyInstaller)
        run: |
          python scripts/build.py --backend pyinstaller --onefile

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabric-${{ matrix.os }}
          path: dist/fabric-*

  # PyPI publishing is disabled for now.
